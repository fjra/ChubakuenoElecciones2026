  var YEAR = "2026";
  var MODE = "hora";

  var theMap;
  for (var k in window) { if (window[k] instanceof L.Map) { theMap = window[k]; break; } }

  var layerHora = L.layerGroup().addTo(theMap);
  var layerAus = L.layerGroup();

  function toColor(val, vMin, vMax) {
    var t = Math.max(0, Math.min(1, (val - vMin) / (vMax - vMin)));
    var r = Math.round(255 * t).toString(16).padStart(2, '0');
    var g = Math.round(255 * (1 - t)).toString(16).padStart(2, '0');
    return '#' + r + g + '00';
  }

  function fmtH(h) {
    var hh = Math.floor(h), mm = Math.round((h - hh) * 60);
    if (mm === 60) { hh += 1; mm = 0; }
    return hh + ':' + String(mm).padStart(2, '0');
  }

  function minsToStr(mins) {
    return Math.floor(mins / 60) + ':' + String(mins % 60).padStart(2, '0');
  }

  function activeData() {
    return DATASETS[YEAR];
  }

  function setMeta() {
    var ds = activeData();
    var meta;
    if (MODE === "hora") {
      meta = {
        title: "Hora promedio de instalacion (" + YEAR + ")",
        min: fmtH(ds.hMin),
        mid: fmtH((ds.hMin + ds.hMax) / 2),
        max: fmtH(ds.hMax)
      };
    } else {
      meta = {
        title: "Ausentismo (%) (" + YEAR + ")",
        min: ds.aMin.toFixed(1) + "%",
        mid: ((ds.aMin + ds.aMax) / 2).toFixed(1) + "%",
        max: ds.aMax.toFixed(1) + "%"
      };
    }
    document.getElementById("leg-title").textContent = meta.title;
    document.getElementById("leg-min").textContent = meta.min;
    document.getElementById("leg-mid").textContent = meta.mid;
    document.getElementById("leg-max").textContent = meta.max;
  }

  function render() {
    var ds = activeData();
    var minHora = Number(document.getElementById("slider").value) / 60;
    layerHora.clearLayers();
    layerAus.clearLayers();

    var shown = 0;
    ds.puntos.forEach(function(p) {
      if (p.hora < minHora) return;
      shown++;
      var popup = '<b>' + p.nombre + '</b> <small>(' + p.dist + ')</small><br>' +
                  'Año: ' + YEAR + '<br>' +
                  'Hora promedio: ' + fmtH(p.hora) + '<br>' +
                  'Ausentismo: ' + p.aus + '%<br>' +
                  'Electores habiles: ' + p.hab + '<br>' +
                  'Mesas: ' + p.n;
      var cHora = toColor(p.hora, ds.hMin, ds.hMax);
      L.circleMarker([p.lat, p.lng], {
        radius: 5, color: cHora, fillColor: cHora, fillOpacity: 0.8, weight: 1
      }).bindPopup(popup).addTo(layerHora);
      if (p.aus !== null) {
        var cAus = toColor(p.aus, ds.aMin, ds.aMax);
        L.circleMarker([p.lat, p.lng], {
          radius: 5, color: cAus, fillColor: cAus, fillOpacity: 0.8, weight: 1
        }).bindPopup(popup).addTo(layerAus);
      }
    });

    document.getElementById("leg-count").textContent =
      shown + ' locales visibles / ' + ds.nLocales + ' locales, ' + ds.nMesas + ' mesas';
    if (MODE === "hora") {
      theMap.addLayer(layerHora);
      theMap.removeLayer(layerAus);
    } else {
      theMap.addLayer(layerAus);
      theMap.removeLayer(layerHora);
    }
  }

  function resetSliderForYear() {
    var ds = activeData();
    var minM = Math.floor(ds.hMin * 60);
    var maxM = Math.ceil(ds.hMax * 60);
    var slider = document.getElementById("slider");
    slider.min = minM;
    slider.max = maxM;
    slider.value = minM;
    document.getElementById("slv").textContent = minsToStr(minM);
  }

  document.getElementById("year-select").addEventListener("change", function() {
    YEAR = this.value;
    resetSliderForYear();
    setMeta();
    render();
  });

  document.getElementById("radio-hora").addEventListener("change", function() {
    MODE = "hora";
    setMeta();
    render();
  });

  document.getElementById("radio-aus").addEventListener("change", function() {
    MODE = "aus";
    setMeta();
    render();
  });

  document.getElementById("slider").addEventListener("input", function() {
    document.getElementById("slv").textContent = minsToStr(Number(this.value));
    render();
  });

  resetSliderForYear();
  setMeta();
  render();
});
</script>
